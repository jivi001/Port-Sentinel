services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8600:8600"
    environment:
      HOST: 0.0.0.0
      PORT: 8600
      # Optional cloud integrations:
      # INFLUXDB_TOKEN: your_token_here
      # SUPABASE_URL: your_supabase_url
      # SUPABASE_KEY: your_supabase_key
    volumes:
      - sentinel-data:/app/backend/data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sentinel-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sentinel-network

networks:
  sentinel-network:
    driver: bridge

volumes:
  sentinel-data:
    driver: local
